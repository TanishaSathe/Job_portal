<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Portal</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    input {
      padding: 10px;
      width: 100%;
      margin-bottom: 20px;
    }
    .job {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }
    button {
      padding: 8px 12px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    #formSection {
      display: none;
      background: white;
      padding: 20px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>
  <h1>Job Portal</h1>
</header>

<div class="container">

  <input type="text" id="search" placeholder="Search jobs..." onkeyup="filterJobs()">

  <div id="jobList"></div>

  <div id="formSection">
    <h3>Apply for Job</h3>
    <input type="text" placeholder="Your Name" id="name"><br><br>
    <input type="file"><br><br>
    <button onclick="submitApplication()">Submit</button>
  </div>

</div>

<script>
const jobs = [
  { title: "Frontend Developer", location: "Pune" },
  { title: "Backend Developer", location: "Mumbai" },
  { title: "UI/UX Designer", location: "Bangalore" },
  { title: "Data Analyst", location: "Delhi" }
];

function displayJobs(list) {
  const jobList = document.getElementById("jobList");
  jobList.innerHTML = "";
  
  list.forEach(job => {
    jobList.innerHTML += `
      <div class="job">
        <h3>${job.title}</h3>
        <p>${job.location}</p>
        <button onclick="applyJob()">Apply</button>
      </div>
    `;
  });
}

function filterJobs() {
  const value = document.getElementById("search").value.toLowerCase();
  const filtered = jobs.filter(job =>
    job.title.toLowerCase().includes(value) ||
    job.location.toLowerCase().includes(value)
  );
  displayJobs(filtered);
}

function applyJob() {
  document.getElementById("formSection").style.display = "block";
}

function submitApplication() {
  alert("Application submitted successfully!");
  document.getElementById("formSection").style.display = "none";
}

displayJobs(jobs);
</script>

</body>
</html>

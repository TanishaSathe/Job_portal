<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Portal</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f3f5f7;
}

/* Navbar */
.navbar {
  background: white;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-weight: bold;
  font-size: 20px;
  color: #ff6f00;
}

/* Search bar */
.search-bar {
  display: flex;
  gap: 10px;
  padding: 15px 30px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.search-bar input {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

.search-bar button {
  background: #ff6f00;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
}

/* Layout */
.main {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* Sidebar */
.sidebar {
  width: 25%;
  background: white;
  padding: 15px;
  border-radius: 8px;
  height: fit-content;
}

.sidebar h4 {
  margin-top: 0;
}

/* Job list */
.jobs {
  width: 75%;
}

.job {
  background: white;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #eee;
}

.job h3 {
  margin: 0;
}

.company {
  font-size: 14px;
  color: #777;
}

.details {
  font-size: 13px;
  margin: 8px 0;
}

.tag {
  display: inline-block;
  background: #e0f2ff;
  color: #0073e6;
  padding: 3px 8px;
  border-radius: 5px;
  font-size: 12px;
  margin-right: 5px;
}

.apply-btn {
  margin-top: 8px;
  background: #0a66c2;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 5px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="navbar">
  <div class="logo">JobPortal</div>
  <div>Login | Register</div>
</div>

<div class="search-bar">
  <input type="text" id="title" placeholder="Job title">
  <input type="text" id="location" placeholder="Location">
  <button onclick="filterJobs()">Search</button>
</div>

<div class="main">

  <!-- Sidebar -->

  <div class="sidebar">
    <h4>Filters</h4>
    <label><input type="checkbox" value="Remote" onchange="filterJobs()"> Remote</label><br>
    <label><input type="checkbox" value="Full-time" onchange="filterJobs()"> Full-time</label>
  </div>

  <!-- Job list -->

  <div class="jobs" id="jobList"></div>

</div>

<script>
const jobs = [
  {
    title: "Frontend Developer",
    company: "Infosys",
    location: "Pune",
    salary: "4-6 LPA",
    type: "Full-time"
  },
  {
    title: "Backend Developer",
    company: "TCS",
    location: "Mumbai",
    salary: "5-8 LPA",
    type: "Remote"
  },
  {
    title: "UI Designer",
    company: "Wipro",
    location: "Bangalore",
    salary: "3-5 LPA",
    type: "Full-time"
  }
];

function displayJobs(list) {
  const jobList = document.getElementById("jobList");
  jobList.innerHTML = "";

  list.forEach(job => {
    jobList.innerHTML += `
      <div class="job">
        <h3>${job.title}</h3>
        <div class="company">${job.company}</div>
        <div class="details">📍 ${job.location} | 💰 ${job.salary}</div>
        <span class="tag">${job.type}</span>
        <br>
        <button class="apply-btn" onclick="apply(this)">Apply</button>
      </div>
    `;
  });
}

function filterJobs() {
  const title = document.getElementById("title").value.toLowerCase();
  const location = document.getElementById("location").value.toLowerCase();

  const checkboxes = document.querySelectorAll('.sidebar input:checked');
  const selectedTypes = Array.from(checkboxes).map(cb => cb.value);

  const filtered = jobs.filter(job =>
    job.title.toLowerCase().includes(title) &&
    job.location.toLowerCase().includes(location) &&
    (selectedTypes.length === 0 || selectedTypes.includes(job.type))
  );

  displayJobs(filtered);
}

function apply(btn) {
  btn.innerText = "Applied";
  btn.disabled = true;
  btn.style.background = "gray";
}

displayJobs(jobs);
</script>

</body>
</html>

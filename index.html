<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Portal</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f7fa;
}

/* Navbar */
.navbar {
  background: white;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-weight: bold;
  font-size: 20px;
  color: #ff6f00;
}

/* Search Section */
.search-bar {
  background: white;
  margin: 20px auto;
  padding: 15px;
  width: 80%;
  display: flex;
  gap: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.search-bar input {
  flex: 1;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

.search-bar button {
  background: #ff6f00;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
}

/* Job Cards */
.container {
  width: 80%;
  margin: auto;
}

.job {
  background: white;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #eee;
  transition: 0.2s;
}

.job:hover {
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.job h3 {
  margin: 0;
  color: #333;
}

.company {
  font-size: 14px;
  color: #777;
}

.details {
  font-size: 13px;
  margin: 8px 0;
  color: #555;
}

.apply-btn {
  background: #0a66c2;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 5px;
  cursor: pointer;
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:8px;
  width:300px;
}
</style>

</head>

<body>

<div class="navbar">
  <div class="logo">JobPortal</div>
  <div>Login | Register</div>
</div>

<div class="search-bar">
  <input type="text" id="searchTitle" placeholder="Search jobs...">
  <input type="text" id="searchLocation" placeholder="Location">
  <button onclick="filterJobs()">Search</button>
</div>

<div class="container" id="jobList"></div>

<!-- Modal -->

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Apply</h3>
    <input type="text" placeholder="Your Name"><br><br>
    <input type="file"><br><br>
    <button onclick="submitApplication()">Submit</button>
  </div>
</div>

<script>
const jobs = [
  {
    title: "Frontend Developer",
    company: "Infosys",
    location: "Pune",
    salary: "4-6 LPA"
  },
  {
    title: "Backend Developer",
    company: "TCS",
    location: "Mumbai",
    salary: "5-8 LPA"
  },
  {
    title: "UI/UX Designer",
    company: "Wipro",
    location: "Bangalore",
    salary: "3-5 LPA"
  }
];

let selectedBtn = null;

function displayJobs(list) {
  const jobList = document.getElementById("jobList");
  jobList.innerHTML = "";

  list.forEach(job => {
    jobList.innerHTML += `
      <div class="job">
        <h3>${job.title}</h3>
        <div class="company">${job.company}</div>
        <div class="details">📍 ${job.location} | 💰 ${job.salary}</div>
        <button class="apply-btn" onclick="applyJob(this)">Apply</button>
      </div>
    `;
  });
}

function filterJobs() {
  const title = document.getElementById("searchTitle").value.toLowerCase();
  const location = document.getElementById("searchLocation").value.toLowerCase();

  const filtered = jobs.filter(job =>
    job.title.toLowerCase().includes(title) &&
    job.location.toLowerCase().includes(location)
  );

  displayJobs(filtered);
}

function applyJob(btn) {
  selectedBtn = btn;
  document.getElementById("modal").style.display = "flex";
}

function submitApplication() {
  alert("Application submitted!");
  document.getElementById("modal").style.display = "none";

  if (selectedBtn) {
    selectedBtn.innerText = "Applied";
    selectedBtn.disabled = true;
    selectedBtn.style.background = "gray";
  }
}

displayJobs(jobs);
</script>

</body>
</html>
